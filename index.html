<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glam Time | Luxury Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#f5f5f5;}

/* TOP BAR */
.topbar{
  background:black;color:white;
  padding:15px 40px;
  display:flex;justify-content:space-between;align-items:center;
}
.topbar h2{color:gold;letter-spacing:2px;}

/* SEARCH */
.search-section{
  background:white;
  padding:15px;
  display:flex;
  justify-content:center;
}
.search-section input{
  width:60%;
  padding:12px;
  border:2px solid gold;
  border-radius:5px 0 0 5px;
}
.search-section button{
  padding:12px;
  background:gold;
  border:none;
  cursor:pointer;
}

/* HERO */
.hero{
  height:200px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,gold,black);
  color:white;
  font-size:24px;
  font-weight:bold;
  text-align:center;
}

/* MAIN */
.main{display:flex;padding:20px;}
.sidebar{
  width:200px;background:white;
  padding:20px;border-radius:10px;
}
.sidebar p{
  margin:10px 0;
  cursor:pointer;
}
.sidebar p:hover{color:gold;}

/* PRODUCTS */
.products{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding-left:20px;
}
.product{
  background:white;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  position:relative;
  transition:0.3s;
}
.product:hover{transform:translateY(-5px);}

/* FAKE IMAGE */
.fake-img{
  height:180px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  font-weight:bold;
  text-align:center;
}

/* LABEL */
.label{
  position:absolute;
  top:10px;left:10px;
  background:red;
  color:white;
  padding:5px 10px;
  border-radius:5px;
  font-size:12px;
}

/* PRODUCT INFO */
.product-info{padding:15px;}
.price{color:#e60000;font-weight:bold;margin-bottom:10px;}

.order-btn{
  width:100%;
  padding:10px;
  background:gold;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

/* CART */
.cart{
  position:fixed;
  top:20px;right:20px;
  background:white;
  width:300px;
  padding:15px;
  border-radius:10px;
  display:none;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}
.cart-show{display:block;}
.cart-item{display:flex;justify-content:space-between;margin-bottom:10px;}
.cart-total{margin-top:10px;font-weight:bold;}

/* FREE GIFT */
.free-gift{
  position:fixed;
  bottom:20px;right:20px;
  background:yellow;
  padding:10px;
  display:none;
  font-weight:bold;
  animation:blink 1s infinite alternate;
}
@keyframes blink{from{opacity:0.6;}to{opacity:1;}}

/* FOOTER */
.footer{
  background:black;color:white;
  text-align:center;
  padding:20px;
  margin-top:30px;
}
.glow{
  color:#00f7ff;
  animation:glow 1.5s infinite alternate;
}
@keyframes glow{
  from{text-shadow:0 0 5px #00f7ff;}
  to{text-shadow:0 0 20px #00f7ff;}
}
</style>
</head>

<body>

<div class="topbar">
  <h2>GLAM TIME</h2>
  <button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</div>

<div class="search-section">
  <input type="text" id="searchInput" placeholder="Search products...">
  <button onclick="filterProducts()">Search</button>
</div>

<div class="hero">
✨ Welcome to Glam Time Collection 💎  
Elegant • Feminine • Luxury
</div>

<div class="main">
  <div class="sidebar">
    <p onclick="filterCategory('All')">All</p>
    <p onclick="filterCategory('Watches')">Watches</p>
    <p onclick="filterCategory('Perfumes')">Perfumes</p>
    <p onclick="filterCategory('Necklaces')">Necklaces</p>
    <p onclick="filterCategory('Bracelets')">Bracelets</p>
  </div>

  <div class="products" id="products"></div>
</div>

<div class="cart" id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <div class="cart-total" id="cartTotal">Total: ₦0</div>
  <button onclick="sendCart()">Send to WhatsApp</button>
</div>

<div class="free-gift" id="freeGift">🎁 Free Gift for 5+ items!</div>

<script>
const whatsappNumber="2347048452919";

const products=[
{name:"Luxury Watch",price:35000,category:"Watches",color:"linear-gradient(135deg,gold,black)",emoji:"⌚",label:"HOT"},
{name:"Royal Perfume",price:25000,category:"Perfumes",color:"linear-gradient(135deg,purple,black)",emoji:"🧴",label:"NEW"},
{name:"Diamond Necklace",price:50000,category:"Necklaces",color:"linear-gradient(135deg,silver,black)",emoji:"💎",label:"HOT"},
{name:"Gold Bracelet",price:18000,category:"Bracelets",color:"linear-gradient(135deg,orange,black)",emoji:"🪙",label:"NEW"},
{name:"Classic Watch",price:30000,category:"Watches",color:"linear-gradient(135deg,gray,black)",emoji:"⌚"},
{name:"Luxury Perfume",price:27000,category:"Perfumes",color:"linear-gradient(135deg,pink,black)",emoji:"🧴"},
{name:"Chain Necklace",price:32000,category:"Necklaces",color:"linear-gradient(135deg,gold,black)",emoji:"💎"},
{name:"Silver Bracelet",price:20000,category:"Bracelets",color:"linear-gradient(135deg,silver,black)",emoji:"🪙"}
];

let cart=[];
const container=document.getElementById("products");

function showProducts(list){
  container.innerHTML="";
  list.forEach((p,i)=>{
    container.innerHTML+=`
    <div class="product">
      ${p.label?`<div class="label">${p.label}</div>`:""}
      <div class="fake-img" style="background:${p.color}">
        <h1>${p.emoji}</h1>
        <p>${p.name}</p>
      </div>
      <div class="product-info">
        <div class="price">₦${p.price}</div>
        <button class="order-btn" onclick="addToCart(${i})">Add to Cart</button>
      </div>
    </div>`;
  });
}

showProducts(products);

function filterCategory(cat){
  if(cat==="All"){showProducts(products);return;}
  showProducts(products.filter(p=>p.category===cat));
}

function filterProducts(){
  const key=document.getElementById("searchInput").value.toLowerCase();
  showProducts(products.filter(p=>p.name.toLowerCase().includes(key)));
}

function addToCart(i){
  cart.push(products[i]);
  updateCart();
}

function updateCart(){
  let total=0;
  const items=document.getElementById("cartItems");
  items.innerHTML="";
  cart.forEach((item,index)=>{
    total+=item.price;
    items.innerHTML+=`
    <div class="cart-item">
      <span>${item.name}</span>
      <button onclick="removeItem(${index})">X</button>
    </div>`;
  });
  document.getElementById("cartTotal").innerText="Total: ₦"+total;
  document.getElementById("cartCount").innerText=cart.length;

  document.getElementById("freeGift").style.display = cart.length>=5 ? "block":"none";
}

function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("cart-show");
}

function sendCart(){
  let msg="Hey Glam Time, I want to purchase:%0A";
  cart.forEach(item=>{msg+=item.name+"%0A";});
  window.open(`https://wa.me/${whatsappNumber}?text=${msg}`);
}
</script>

<div class="footer">
  <p>© 2026 Glam Time</p>
  <p class="glow">Developed By JËRRY ÇØDËX 💻</p>
</div>

</body>
</html>
