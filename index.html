body{

  background:#0d0d0d;

/* HEADER */
header{
  text-align:center;
  padding:20px;
  background:black;
  border-bottom:3px solid gold;
}

header h1{
  color:gold;
  font-size:38px;
  font-weight:bold;
}

/* SLIDER */
.slider{
  position:relative;
  width:100%;
  height:300px;
  overflow:hidden;
}

.slides{
  display:flex;
  width:300%;
  animation:slide 12s infinite;
}

.slides img{
  width:100%;
  height:300px;
  object-fit:cover;
}

@keyframes slide{
  0%{margin-left:0;}
  30%{margin-left:0;}
  35%{margin-left:-100%;}
  65%{margin-left:-100%;}
  70%{margin-left:-200%;}
  100%{margin-left:-200%;}
}

/* PROMO BAR */
.promo{
  background:gold;
  color:black;
  text-align:center;
  padding:10px;
  font-weight:bold;
  animation:blink 1.5s infinite alternate;
}

@keyframes blink{
  from{opacity:1;}
  to{opacity:0.6;}
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.product{
  background:#1a1a1a;
  border:1px solid gold;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.product img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}

button{
  background:gold;
  border:none;
  padding:8px 15px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
  border-radius:5px;
}

.footer{
  text-align:center;
  padding:20px;
  background:black;
  border-top:2px solid gold;
}

a{
  color:gold;
  text-decoration:none;
  margin:0 10px;
}
</style>
</head>
