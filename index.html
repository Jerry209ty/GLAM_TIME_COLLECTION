<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glam_Time Collection</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0d0d0d;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
  background:black;
  border-bottom:3px solid gold;
}
header h1 {
  color:gold;
  font-size:38px;
  font-weight:bold;
}
header p {
  color:#f5d76e;
  font-size:18px;
}

/* SLIDER */
.slider {
  position:relative;
  width:100%;
  height:300px;
  overflow:hidden;
  margin-bottom:10px;
}
.slides {
  display:flex;
  transition: margin-left 1s ease-in-out;
}
.slides img {
  width:100%;
  height:300px;
  object-fit:cover;
}

/* PROMO BAR */
.promo {
  background:gold;
  color:black;
  text-align:center;
  padding:10px;
  font-weight:bold;
  animation:blink 1.5s infinite alternate;
}
@keyframes blink {
  from{opacity:1;}
  to{opacity:0.6;}
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}
.product {
  background:#1a1a1a;
  border:1px solid gold;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.product img {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:8px;
}
button {
  background:gold;
  border:none;
  padding:8px 15px;
  margin-top:10px;
  cursor:pointer;
  font-weight:bold;
  border-radius:5px;
}

/* FOOTER */
.footer {
  text-align:center;
  padding:20px;
  background:black;
  border-top:2px solid gold;
}
a {
  color:gold;
  text-decoration:none;
  margin:0 10px;
}
</style>
</head>

<p>👑 Elegant & Luxury | ✨ Glamorous & Chic | 💎 Soft & Feminine</p>
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slides" id="slides"></div>
</div>

</div>

<script>
// ====== SLIDER SETUP ======
const sliderImages = [
  "watch1.jpg",
  "bracelet1.jpg",
  "set1.jpg",
  "perfume1.jpg"
  // Add more images here
];

const slidesContainer = document.getElementById("slides");

sliderImages.forEach(img => {
  const image = document.createElement("img");
  image.src = img;
  slidesContainer.appendChild(image);
});

let currentIndex = 0;
function showSlide() {
  const total = sliderImages.length;
  slidesContainer.style.marginLeft = `-${currentIndex * 100}%`;
  currentIndex = (currentIndex + 1) % total;
}
setInterval(showSlide, 3000); // change slide every 3 seconds

// ====== PRODUCT LISTING ======
const productList = [
  {name:"Luxury Wrist Watch", price:"₦35,000", image:"watch3.jpg"},
  {name:"Gold & Black Bracelet", price:"₦12,000", image:"bracelet4.jpg"},
  {name:"Elegant Jewelry Set", price:"₦28,000", image:"bracelet3.jpg"},
  {name:"Perfume Deluxe", price:"₦25,000", image:"perfume3.jpg"},
  {name:"Chain Gold", price:"₦15,000", image:"perfume2.jpg"},
  {name:"Necklace Chain", price:"₦8,000", image:"necklace2.jpg"},
  {name:"Silver Necklace", price:"₦18,000", image:"necklace1.jpg"},
  {name:"Richard mille", price:"DM FOR PRICE", image:"watch2.jpg"},
  {name:"Bracelet Elegant", price:"₦10,000", image:"bracelet2.jpg"},
  {name:"Perfume Royal", price:"₦20,000", image:"perfume2.jpg"},
  {name:"Stylish Specks", price:"₦12,000", image:"specks2.jpg"},
  {name:"Luxury Set", price:"₦40,000", image:"watch5.jpg"}
  // Add more products here
];

const productsContainer = document.getElementById("products");

productList.forEach(product => {
  const div = document.createElement("div");
  div.className = "product";
  div.innerHTML = `
    <img src="${product.image}">
    <h3>${product.name}</h3>
    <p>${product.price}</p>
    <button>Order Now</button>

// ====== WHATSAPP BUTTON UPDATE ======
const whatsappBtn = document.getElementById("whatsappBtn");
whatsappBtn.onclick = () => {
  const message = "HEY GLAM_TIME COLLECTION I WANT TO BUY: " + productList.map(p=>p.name).join(", ");
  whatsappBtn.href = "https://wa.me/2347048452919?text=" + encodeURIComponent(message);
};
</script>

</html>
