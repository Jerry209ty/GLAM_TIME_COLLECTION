<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Glam Time | Luxury Store</title>
<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif;}
body{background:#f4f4f4; text-align:center;}

/* NAVBAR */
.navbar{
  background:#111; color:white;
  display:flex; justify-content:space-between;
  padding:15px 30px; align-items:center;
}
.navbar h2{letter-spacing:2px;}
.navbar a{color:white; text-decoration:none; margin-left:20px;}

/* SLIDER */
.slider{width:100%; height:300px; overflow:hidden; position:relative;}
.slides{display:flex; width:300%; animation:slide 12s infinite;}
.slides img{width:100%; height:300px; object-fit:cover;}
@keyframes slide{0%{margin-left:0;} 33%{margin-left:-100%;} 66%{margin-left:-200%;} 100%{margin-left:0;}}

/* SECTION TITLE */
.section-title{margin:40px 0 20px; font-size:28px;}

/* PRODUCTS */
#products{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:25px; padding:0 40px 40px;}
.product{background:white; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.1); overflow:hidden; transition:0.3s;}
.product:hover{transform:translateY(-5px);}
.product img{width:100%; height:200px; object-fit:cover;}
.product-info{padding:15px;}
.product-info h3{margin-bottom:10px;}
.price{color:#00a8cc; font-weight:bold; margin-bottom:15px;}
button{width:100%; padding:10px; background:#111; color:white; border:none; cursor:pointer; transition:0.3s;}
button:hover{background:#00a8cc;}

/* FOOTER */
.footer{background:#111; color:white; text-align:center; padding:30px; margin-top:50px;}
.glow{font-weight:bold; letter-spacing:3px; color:#00f7ff; animation:glowEffect 1.5s ease-in-out infinite alternate;}
@keyframes glowEffect{from{text-shadow:0 0 5px #00f7ff,0 0 10px #00f7ff;} to{text-shadow:0 0 15px #00f7ff,0 0 30px #00f7ff;}}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>GLAM TIME</h2>
  <div>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slides">
    <img src="sliderImages/slide1.jpg">
    <img src="sliderImages/slide2.jpg">
    <img src="sliderImages/slide3.jpg">
  </div>
</div>

<h2 class="section-title">Our Products</h2>

<div id="products"></div>

<script>
// WhatsApp number for Glam Time
const whatsappNumber = "2347048452919";

// Main products with name & price
const products = [
  { name:"Luxury Watch", price:"₦35,000", image:"productImages/watch1.jpg" },
  { name:"Gold Bracelet", price:"₦18,000", image:"productImages/bracelet1.jpg" },
  { name:"Premium Perfume", price:"₦25,000", image:"productImages/perfume1.jpg" }
];

// Extra products: just images, no price
const extraProducts = [
  "productImages/new1.jpg",
  "productImages/new2.jpg"
];

// Add extra products with default name & price
extraProducts.forEach(img => {
  products.push({ name:"New Product", price:"₦TBD", image:img });
});

// Render products
const container = document.getElementById("products");
products.forEach(product => {
  const card = document.createElement("div");
  card.classList.add("product");
  card.innerHTML = `
    <img src="${product.image}">
    <div class="product-info">
      <h3>${product.name}</h3>
      <div class="price">${product.price}</div>
      <button onclick="orderNow()">Order Now</button>
    </div>
  `;
  container.appendChild(card);
});

// WhatsApp order function with pre-filled message
function orderNow(){
  const message = "Hey Glam Time, I want to purchase";
  const url = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;
  window.open(url, "_blank");
}
</script>

<!-- FOOTER -->
<div class="footer">
  <p>© 2026 Glam Time. All Rights Reserved.</p>
  <p class="glow">Developed By JËRRY ÇØDËX 💻</p>
</div>

</body>
</html>
